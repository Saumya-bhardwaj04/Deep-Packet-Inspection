services:
  - type: web
    name: packet-analyzer-api
    env: node
    rootDir: node_backend
    buildCommand: npm install && python3 -m pip install -r ../python_engine/requirements-render.txt
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: PORT
        value: 8000
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PYTHON_BIN
        value: python3
      - key: PYTHON_SCRIPT_PATH
        value: ../python_engine/cli.py
      - key: PYTHON_STREAM_SCRIPT_PATH
        value: ../python_engine/live_stream.py
      - key: PYTHON_CAPTURE_CHECK_SCRIPT_PATH
        value: ../python_engine/check_capture.py
